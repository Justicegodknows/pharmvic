services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Supabase — auth only
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      # Docker PostgreSQL — all business data
      - DATABASE_URL=postgresql://${POSTGRES_USER:-pharmvic}:${POSTGRES_PASSWORD:-pharmvic}@postgres:5432/${POSTGRES_DB:-pharmvic}
      # Chat LLM + Embeddings — Hugging Face Inference API (OpenAI-compatible)
      # Both chat and embeddings share the same base URL and API key.
      - LLM_BASE_URL=${LLM_BASE_URL:-https://router.huggingface.co/v1}
      - LLM_MODEL=${LLM_MODEL:-MiniMaxAI/MiniMax-M2.7}
      - LLM_API_KEY=${LLM_API_KEY:-}
      # Override embedding model if needed (default: mixedbread-ai/mxbai-embed-large-v1, 1024 dims)
      - HF_EMBEDDING_MODEL=${HF_EMBEDDING_MODEL:-mixedbread-ai/mxbai-embed-large-v1}
      # Misc
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
      - SEARXNG_URL=${SEARXNG_URL:-}
      - RAG_ADMIN_API_KEY=${RAG_ADMIN_API_KEY:-}
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      # Allows the app container to reach Docker Model Runner on the host
      - "model-runner.docker.internal:host-gateway"
    networks:
      - pharmconnect-net
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pharmvic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pharmvic}
      POSTGRES_DB: ${POSTGRES_DB:-pharmvic}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - pharmconnect-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pharmvic} -d ${POSTGRES_DB:-pharmvic}" ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  uploads_data:


networks:
  pharmconnect-net:
    driver: bridge
