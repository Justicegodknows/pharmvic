# Production compose override — uses pre-built image from DigitalOcean Container Registry.
#
# Usage (on the production host):
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml pull app
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Build and push from your dev machine or CI first:
#   bash scripts/deploy.sh [tag]

services:
  app:
    # Pull the pre-built image instead of building from source.
    # Overrides the `build:` block in docker-compose.yml.
    image: registry.digitalocean.com/pharmvic/pharmvic:${IMAGE_TAG:-latest}
    build: !reset null
    environment:
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-https://pharmvic.app}
